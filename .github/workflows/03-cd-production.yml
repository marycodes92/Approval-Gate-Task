name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm_deployment:
        description: 'Type "deploy" to confirm'
        required: true
        type: string
      version_tag:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string
        default: 'latest'

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment intent
        if: ${{ github.event.inputs.confirm_deployment != 'deploy' }}
        run: |
          echo "❌ Type 'deploy' to confirm"
          exit 1

      - name: Deployment confirmed
        run: |
          echo "✅ Production deployment confirmed by: ${{ github.actor }}"
          echo "📋 Version: ${{ github.event.inputs.version_tag }}"

  pre-deploy-tests:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy-production:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    needs: pre-deploy-tests

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      - name: Create deployment package
        run: |
          mkdir -p deploy_package
          cp -r app.py templates static requirements.txt deploy_package/
          tar -czf deploy.tar.gz deploy_package

      - name: Copy files to Production VM
        env:
          SSHPASS: ${{ secrets.PROD_VM_PASSWORD }}
        run: |
          sshpass -e scp -o StrictHostKeyChecking=no \
            deploy.tar.gz \
            ${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_HOST }}:/tmp/

      - name: Deploy application on Production VM
        env:
          SSHPASS: ${{ secrets.PROD_VM_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_HOST }} << 'DEPLOY_SCRIPT'

            set -e

            echo "🚀 Starting PRODUCTION deployment..."

            APP_DIR="/opt/flask-app"
            BACKUP_DIR="/opt/flask-app-backup-$(date +%Y%m%d_%H%M%S)"

            # Create timestamped backup
            if [ -d "$APP_DIR" ]; then
              echo "📦 Creating backup at $BACKUP_DIR..."
              sudo cp -r $APP_DIR $BACKUP_DIR
            fi

            # Extract new deployment
            echo "📂 Extracting new version..."
            cd /tmp
            tar -xzf deploy.tar.gz
            sudo mkdir -p $APP_DIR
            sudo cp -r deploy_package/* $APP_DIR/

            # Setup Python environment
            echo "🐍 Setting up Python environment..."
            cd $APP_DIR
            sudo python3 -m venv venv || true
            sudo $APP_DIR/venv/bin/pip install --upgrade pip
            sudo $APP_DIR/venv/bin/pip install -r requirements.txt

            # Restart application
            echo "🔄 Restarting application..."
            sudo systemctl restart flask-app || sudo $APP_DIR/venv/bin/gunicorn -w 4 -b 0.0.0.0:5000 app:app --daemon

            sleep 5

            # Health check
            echo "🏥 Running health check..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Production deployment successful!"
            else
              echo "❌ Health check failed! Rolling back..."
              sudo rm -rf $APP_DIR
              LATEST_BACKUP=$(ls -td /opt/flask-app-backup-* | head -1)
              sudo mv $LATEST_BACKUP $APP_DIR
              sudo systemctl restart flask-app || true
              exit 1
            fi

            rm -rf /tmp/deploy_package /tmp/deploy.tar.gz
            echo "🎉 Production deployment complete!"

          DEPLOY_SCRIPT

      - name: Verify Production Deployment
        run: |
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.PROD_VM_HOST }}:5000/health)
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

      - name: Deployment Summary
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ github.event.inputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** http://${{ secrets.PROD_VM_HOST }}:5000" >> $GITHUB_STEP_SUMMARY
